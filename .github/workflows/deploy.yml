name: Deploy — jsreport Templates

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  REPORTS_SRC:  reports
  JSREPORT_DIR: C:\services\jsreport\data
  JSREPORT_SVC: jsreport

jobs:
  deploy:
    name: Sync · Restart
    runs-on: [self-hosted, Windows]

    steps:
      # ── 1. Código fuente ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Detener jsreport antes de sincronizar ────────────────────────────
      #    Necesario para que robocopy /MIR pueda eliminar archivos que jsreport
      #    mantiene abiertos (p.ej. samples). Sin esto robocopy devuelve código 8+.
      - name: Stop jsreport service
        shell: powershell
        run: |
          Stop-Service -Name "${{ env.JSREPORT_SVC }}" -Force -ErrorAction SilentlyContinue
          Write-Host "Servicio '${{ env.JSREPORT_SVC }}' detenido."

      # ── 3. Sincronizar reports\ → C:\services\jsreport\data\ ───────────────
      #    /MIR  = mirror (copia nuevos/modificados, elimina los que ya no existen)
      #    /NJH  = sin encabezado  /NJS = sin resumen  /NDL = sin lista de dirs
      #    /R:3  = 3 reintentos    /W:5 = esperar 5 s entre reintentos
      - name: Sync reports to jsreport data folder
        shell: powershell
        run: |
          $src  = "${{ github.workspace }}\${{ env.REPORTS_SRC }}"
          $dest = "${{ env.JSREPORT_DIR }}"

          Write-Host "Sincronizando '$src' -> '$dest' ..."
          robocopy $src $dest /MIR /NJH /NJS /NDL /R:3 /W:5

          # robocopy devuelve códigos 0-7 como éxito; 8+ son errores reales
          if ($LASTEXITCODE -ge 8) {
            Write-Error "robocopy falló con código $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          Write-Host "Sincronización completada."
          exit 0   # robocopy 0-7 = éxito; sin esto GitHub Actions ve el código de robocopy (ej. 1) como fallo

      # ── 4. Iniciar servicio jsreport ─────────────────────────────────────────
      - name: Start jsreport service
        shell: powershell
        run: |
          Start-Service -Name "${{ env.JSREPORT_SVC }}"
          Start-Sleep -Seconds 5
          $svc = Get-Service -Name "${{ env.JSREPORT_SVC }}"
          Write-Host "Servicio '${{ env.JSREPORT_SVC }}' estado: $($svc.Status)"
          if ($svc.Status -ne "Running") {
            Write-Error "El servicio no arrancó correctamente."
            exit 1
          }
